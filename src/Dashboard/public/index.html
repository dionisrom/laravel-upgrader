<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laravel Upgrader — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display:inline-block; animation: spin 1s linear infinite; }
  #log-panel { scroll-behavior: smooth; }
  #log-panel.paused { scroll-behavior: auto; }
</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-full font-mono text-sm">

<!-- ===== HEADER ===== -->
<header class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="text-red-500 font-bold text-lg">⚡ Laravel Upgrader</span>
    <span id="hop-label" class="bg-gray-700 text-gray-300 px-2 py-0.5 rounded text-xs">—</span>
  </div>
  <div class="flex items-center gap-2">
    <span id="status-dot" class="w-3 h-3 rounded-full bg-red-500 inline-block"></span>
    <span id="status-text" class="text-gray-400 text-xs">Connecting…</span>
  </div>
</header>

<main class="p-6 grid grid-cols-1 gap-6 lg:grid-cols-3">

  <!-- ===== LEFT COLUMN ===== -->
  <div class="lg:col-span-2 flex flex-col gap-6">

    <!-- Progress bar -->
    <section class="bg-gray-800 rounded-lg p-4 border border-gray-700">
      <div class="flex justify-between text-xs text-gray-400 mb-1">
        <span>Progress — <span id="stages-done">0</span>/<span id="stages-total">7</span> stages</span>
        <span id="elapsed-display">00:00</span>
      </div>
      <div class="w-full bg-gray-700 rounded-full h-4">
        <div id="progress-bar" class="bg-blue-500 h-4 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
      <div class="text-right text-xs text-gray-400 mt-1"><span id="progress-pct">0</span>%</div>
    </section>

    <!-- Pipeline stages -->
    <section class="bg-gray-800 rounded-lg p-4 border border-gray-700">
      <h2 class="text-gray-300 font-semibold mb-3 text-xs uppercase tracking-wider">Pipeline Stages</h2>
      <ul id="stage-list" class="space-y-1">
        <!-- stages injected by JS -->
      </ul>
    </section>

    <!-- Live log -->
    <section class="bg-gray-800 rounded-lg p-4 border border-gray-700">
      <h2 class="text-gray-300 font-semibold mb-3 text-xs uppercase tracking-wider">Live Log</h2>
      <div id="log-panel" class="h-64 overflow-y-auto bg-gray-900 rounded p-2 text-xs space-y-0.5">
        <!-- log entries -->
      </div>
    </section>

    <!-- Lumen sub-view (hidden by default) -->
    <section id="lumen-section" class="hidden bg-gray-800 rounded-lg p-4 border border-yellow-700">
      <h2 class="text-yellow-400 font-semibold mb-3 text-xs uppercase tracking-wider">🌙 Lumen Migration</h2>
      <div id="lumen-status" class="text-gray-300 text-xs">Lumen migration in progress…</div>
    </section>

  </div>

  <!-- ===== RIGHT COLUMN ===== -->
  <div class="flex flex-col gap-6">

    <!-- Summary counters -->
    <section class="bg-gray-800 rounded-lg p-4 border border-gray-700">
      <h2 class="text-gray-300 font-semibold mb-3 text-xs uppercase tracking-wider">Summary</h2>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-gray-700 rounded p-3 text-center">
          <div id="cnt-files" class="text-2xl font-bold text-blue-400">0</div>
          <div class="text-gray-400 text-xs mt-1">Files Changed</div>
        </div>
        <div class="bg-gray-700 rounded p-3 text-center">
          <div id="cnt-warnings" class="text-2xl font-bold text-yellow-400">0</div>
          <div class="text-gray-400 text-xs mt-1">Warnings</div>
        </div>
        <div class="bg-gray-700 rounded p-3 text-center">
          <div id="cnt-errors" class="text-2xl font-bold text-red-400">0</div>
          <div class="text-gray-400 text-xs mt-1">Errors</div>
        </div>
        <div class="bg-gray-700 rounded p-3 text-center">
          <div id="cnt-manual" class="text-2xl font-bold text-orange-400">0</div>
          <div class="text-gray-400 text-xs mt-1">Manual Review</div>
        </div>
      </div>

      <!-- Confidence (shown after hop_complete) -->
      <div id="confidence-row" class="hidden mt-3 text-center text-xs text-gray-400">
        Confidence: <span id="confidence-val" class="text-green-400 font-bold">—</span>
      </div>
    </section>

    <!-- Breaking changes -->
    <section class="bg-gray-800 rounded-lg p-4 border border-gray-700">
      <h2 class="text-gray-300 font-semibold mb-3 text-xs uppercase tracking-wider">Breaking Changes</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="text-gray-500 border-b border-gray-700">
              <th class="text-left pb-1 pr-2">Rule</th>
              <th class="text-left pb-1 pr-2">Type</th>
              <th class="text-right pb-1">Files</th>
            </tr>
          </thead>
          <tbody id="breaking-table">
            <tr id="break-empty"><td colspan="3" class="text-gray-600 py-2 text-center">No changes yet</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>
</main>

<script>
// ============================================================
// State
// ============================================================
const STAGES = ['inventory','rector','composer','config','lumen','verify','report'];
const stageStatus = {}; // 'pending' | 'running' | 'done' | 'failed'
let stagesDone = 0;
let startTs = null;
let elapsedTimer = null;
let logEntries = [];
const MAX_LOG = 100;
let retryDelay = 1000;
const maxDelay = 30000;
let counters = { files: 0, warnings: 0, errors: 0, manual: 0 };

// ============================================================
// DOM helpers
// ============================================================
const $ = id => document.getElementById(id);

function updateStatus(state) {
  const dot = $('status-dot');
  const txt = $('status-text');
  if (state === 'connected') {
    dot.className = 'w-3 h-3 rounded-full bg-green-500 inline-block';
    txt.textContent = 'Connected';
  } else if (state === 'disconnected') {
    dot.className = 'w-3 h-3 rounded-full bg-red-500 inline-block';
    txt.textContent = 'Disconnected';
  } else {
    dot.className = 'w-3 h-3 rounded-full bg-yellow-400 inline-block';
    txt.textContent = 'Reconnecting…';
  }
}

function pad2(n) { return String(n).padStart(2, '0'); }

function fmtElapsed(secs) {
  return pad2(Math.floor(secs / 60)) + ':' + pad2(secs % 60);
}

// ============================================================
// Stage rendering
// ============================================================
function iconFor(status) {
  switch (status) {
    case 'running': return '<span class="spin">🔄</span>';
    case 'done':    return '✅';
    case 'failed':  return '❌';
    default:        return '⏳';
  }
}

function colorFor(status) {
  switch (status) {
    case 'running': return 'text-blue-400';
    case 'done':    return 'text-green-400';
    case 'failed':  return 'text-red-400';
    default:        return 'text-gray-500';
  }
}

function initStages() {
  const ul = $('stage-list');
  ul.innerHTML = '';
  STAGES.forEach(s => {
    stageStatus[s] = 'pending';
    const li = document.createElement('li');
    li.id = 'stage-' + s;
    li.className = 'flex items-center gap-2 py-0.5 px-2 rounded ' + colorFor('pending');
    li.innerHTML = `<span class="icon">${iconFor('pending')}</span><span class="capitalize">${s}</span>`;
    ul.appendChild(li);
  });
}

function setStageStatus(stage, status) {
  stageStatus[stage] = status;
  const li = document.getElementById('stage-' + stage);
  if (!li) return;
  li.className = 'flex items-center gap-2 py-0.5 px-2 rounded ' + colorFor(status);
  li.querySelector('.icon').innerHTML = iconFor(status);
  updateProgress();
}

function updateProgress() {
  const done = STAGES.filter(s => stageStatus[s] === 'done').length;
  const total = STAGES.length;
  const pct = Math.round((done / total) * 100);
  $('stages-done').textContent = String(done);
  $('stages-total').textContent = String(total);
  $('progress-bar').style.width = pct + '%';
  $('progress-pct').textContent = String(pct);
}

// ============================================================
// Log panel
// ============================================================
const logPanel = document.getElementById('log-panel');
logPanel.addEventListener('mouseenter', () => logPanel.classList.add('paused'));
logPanel.addEventListener('mouseleave', () => logPanel.classList.remove('paused'));

function addLog(type, msg) {
  const entry = { ts: new Date().toISOString().substring(11, 19), type, msg };
  logEntries.push(entry);
  if (logEntries.length > MAX_LOG) logEntries.shift();

  const div = document.createElement('div');
  div.className = 'flex gap-2';
  div.innerHTML = `<span class="text-gray-600 shrink-0">${entry.ts}</span>`
    + `<span class="text-purple-400 shrink-0">${entry.type}</span>`
    + `<span class="text-gray-300 break-all">${escHtml(entry.msg)}</span>`;
  logPanel.appendChild(div);

  // Cap DOM entries
  while (logPanel.children.length > MAX_LOG) {
    logPanel.removeChild(logPanel.firstChild);
  }

  if (!logPanel.classList.contains('paused')) {
    logPanel.scrollTop = logPanel.scrollHeight;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ============================================================
// Breaking changes table
// ============================================================
function addBreakingChange(ruleId, type, files) {
  const tbody = $('breaking-table');
  const empty = $('break-empty');
  if (empty) empty.remove();

  const tr = document.createElement('tr');
  tr.className = 'border-b border-gray-700';
  const badge = type === 'MANUAL'
    ? '<span class="bg-orange-500 text-white text-xs px-1 rounded">MANUAL</span>'
    : '<span class="bg-green-600 text-white text-xs px-1 rounded">AUTO</span>';
  tr.innerHTML = `<td class="py-1 pr-2 text-gray-300 break-all">${escHtml(ruleId)}</td>`
    + `<td class="py-1 pr-2">${badge}</td>`
    + `<td class="py-1 text-right text-gray-400">${files !== undefined ? files : '—'}</td>`;
  tbody.appendChild(tr);
}

// ============================================================
// Counters
// ============================================================
function incCounter(key) {
  counters[key]++;
  const map = { files: 'cnt-files', warnings: 'cnt-warnings', errors: 'cnt-errors', manual: 'cnt-manual' };
  const el = $(map[key]);
  if (el) el.textContent = String(counters[key]);
}

function resetCounters() {
  counters = { files: 0, warnings: 0, errors: 0, manual: 0 };
  $('cnt-files').textContent = '0';
  $('cnt-warnings').textContent = '0';
  $('cnt-errors').textContent = '0';
  $('cnt-manual').textContent = '0';
}

// ============================================================
// Elapsed timer
// ============================================================
function startElapsed() {
  startTs = Date.now();
  if (elapsedTimer) clearInterval(elapsedTimer);
  elapsedTimer = setInterval(() => {
    const secs = Math.floor((Date.now() - startTs) / 1000);
    $('elapsed-display').textContent = fmtElapsed(secs);
  }, 1000);
}

// ============================================================
// Event handler
// ============================================================
function handleEvent(event) {
  const type = event.event || event.type || 'unknown';
  const data = event.data || event;
  const summary = data.message || data.file || data.stage || data.rule || '';

  addLog(type, summary);

  switch (type) {
    case 'connected':
      updateStatus('connected');
      break;

    case 'pipeline_start':
      resetCounters();
      initStages();
      startElapsed();
      if (data.hop) $('hop-label').textContent = data.hop;
      break;

    case 'stage_start': {
      const stage = data.stage;
      if (stage && STAGES.includes(stage)) setStageStatus(stage, 'running');
      if (stage === 'lumen') {
        $('lumen-section').classList.remove('hidden');
        $('lumen-status').textContent = 'Lumen migration started…';
      }
      break;
    }

    case 'stage_complete': {
      const stage = data.stage;
      if (stage && STAGES.includes(stage)) setStageStatus(stage, 'done');
      break;
    }

    case 'pipeline_error': {
      const stage = data.stage;
      if (stage && STAGES.includes(stage)) setStageStatus(stage, 'failed');
      incCounter('errors');
      break;
    }

    case 'file_changed':
      incCounter('files');
      break;

    case 'warning':
      incCounter('warnings');
      break;

    case 'breaking_change_applied':
      addBreakingChange(data.rule || '—', 'AUTO', data.files_affected);
      break;

    case 'manual_review_required':
      addBreakingChange(data.rule || '—', 'MANUAL', data.files_affected);
      incCounter('manual');
      break;

    case 'hop_complete': {
      STAGES.forEach(s => {
        if (stageStatus[s] === 'running') setStageStatus(s, 'done');
      });
      if (data.confidence !== undefined) {
        $('confidence-row').classList.remove('hidden');
        $('confidence-val').textContent = data.confidence + '%';
      }
      if (elapsedTimer) clearInterval(elapsedTimer);
      break;
    }

    case 'hop_skipped':
      addLog('info', 'Hop skipped: ' + (data.reason || ''));
      break;

    default:
      // Other event types are logged but require no UI action
      break;
  }
}

// ============================================================
// SSE with exponential backoff
// ============================================================
function connect() {
  const es = new EventSource('/events');

  es.onopen = () => {
    retryDelay = 1000;
    updateStatus('connected');
  };

  es.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      handleEvent(event);
    } catch (err) {
      addLog('parse-error', String(err));
    }
  };

  es.onerror = () => {
    es.close();
    updateStatus('reconnecting');
    setTimeout(connect, retryDelay);
    retryDelay = Math.min(retryDelay * 2, maxDelay);
  };
}

// ============================================================
// Bootstrap
// ============================================================
initStages();
updateProgress();
connect();
</script>
</body>
</html>
